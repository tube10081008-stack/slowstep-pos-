<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>슬로우스텝 멤버십</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0a0908; --card:#121110; --card2:#151312; --line:#2a251f; --hair:rgba(203,171,109,.20);
    --txt:#ece6da; --muted:#8b8274; --gold:#cbab6d; --gold-hi:#e7d5a6; --gold2:#a5854c;
    --coffee:#b7966a; --accent:#cbab6d; --green:#a3b89c;
    --serif:"Noto Serif KR", Georgia, serif;
    --sans:"Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:
      radial-gradient(140% 55% at 50% -8%, #171310 0%, var(--bg) 55%),
      var(--bg);
    color:var(--txt); font-family:var(--sans); font-weight:400;
    letter-spacing:.01em; }
  .wrap { max-width:460px; margin:0 auto; padding:22px 16px 64px; }
  .card { background:var(--card2); border:1px solid var(--line); border-radius:16px;
    padding:20px; margin-bottom:14px; box-shadow:0 1px 0 rgba(255,255,255,.02) inset; }
  h3 { font-family:var(--serif); font-size:15px; font-weight:600; margin:0 0 16px;
    letter-spacing:.01em; color:#e4dccd; }
  .eyebrow { font-size:10px; letter-spacing:.34em; text-transform:uppercase;
    color:var(--gold); font-weight:500; }
  .muted { color:var(--muted); font-size:12px; }
  .hidden { display:none; }

  /* 로그인 */
  input { width:100%; background:#0f0d0b; border:1px solid var(--line); color:var(--txt);
    border-radius:11px; padding:15px; font-size:16px; margin-top:8px; font-family:var(--sans); }
  button.go { width:100%; border:0; border-radius:11px; padding:15px; font-weight:600; margin-top:12px;
    color:#211703; background:linear-gradient(135deg,var(--gold-hi),var(--gold)); cursor:pointer;
    font-size:14px; letter-spacing:.08em; }

  /* 히어로 */
  .hero { text-align:center; padding:32px 20px 24px; position:relative; overflow:hidden;
    background:linear-gradient(170deg,#1b1712 0%,#100d0b 100%);
    border:1px solid var(--line); border-radius:18px; margin-bottom:14px; }
  .hero::after { content:""; position:absolute; inset:0 0 auto 0; height:1px;
    background:linear-gradient(90deg,transparent,var(--hair),transparent); }
  .hero .name { font-family:var(--serif); font-size:24px; font-weight:600; margin-top:6px; letter-spacing:.02em; }
  .tier-badge { display:inline-flex; align-items:center; gap:5px; font-size:10px; padding:5px 14px;
    border-radius:999px; font-weight:600; margin-top:12px; letter-spacing:.22em; text-transform:uppercase; }
  .t-BRONZE{ background:#221a12; color:#c8a575; border:1px solid #4a3a24; }
  .t-SILVER{ background:#1b1f24; color:#c9d3de; border:1px solid #445162; }
  .t-GOLD{ background:linear-gradient(135deg,#e7d5a6,#a5854c); color:#241a0c; }
  .points { font-family:var(--serif); font-size:46px; font-weight:600; margin-top:20px; color:var(--gold-hi);
    text-shadow:0 2px 30px rgba(203,171,109,.22); letter-spacing:0; line-height:1; }
  .points span { font-size:15px; color:var(--muted); font-weight:400; font-family:var(--sans); margin-left:2px; }
  .hstats { display:flex; justify-content:space-around; margin-top:22px; padding-top:18px;
    border-top:1px solid var(--line); }
  .hstats div { font-size:10px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; }
  .hstats b { display:block; font-family:var(--serif); font-size:19px; font-weight:500; color:var(--txt); margin-top:6px; }

  /* 등급 진행 링 */
  .ring-wrap { display:flex; align-items:center; gap:18px; }
  .ring { position:relative; width:96px; height:96px; flex:0 0 96px; }
  .ring svg { transform:rotate(-90deg); }
  .ring .pct { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring .pct b { font-family:var(--serif); font-size:23px; font-weight:600; color:var(--gold-hi); }
  .ring .pct span { font-size:8px; color:var(--muted); letter-spacing:.2em; text-transform:uppercase; margin-top:2px; }
  .ring-info .big { font-family:var(--serif); font-size:16px; font-weight:500; }
  .ring-info .sub { font-size:12px; color:var(--muted); margin-top:5px; line-height:1.6; }

  /* 랭킹 */
  .myrank { display:flex; align-items:baseline; gap:10px; margin-bottom:14px; }
  .myrank .r { font-family:var(--serif); font-size:32px; font-weight:600; color:var(--gold-hi); }
  .myrank .pctl { font-size:11px; color:var(--gold); font-weight:500; letter-spacing:.1em;
    background:#181410; border:1px solid var(--line); padding:4px 10px; border-radius:999px; }
  .lb-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; font-size:14px; }
  .lb-row.me { background:linear-gradient(90deg,#1d1811,#151312); border:1px solid var(--gold2); }
  .lb-rank { width:24px; text-align:center; font-weight:600; color:var(--muted); font-family:var(--serif); }
  .lb-name { flex:1; letter-spacing:.02em; }
  .lb-val { color:var(--muted); font-size:12px; }
  .lb-row.me .lb-name { color:var(--gold-hi); font-weight:500; }

  /* 배지 */
  .badges { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .badge { text-align:center; padding:14px 4px; border-radius:12px; background:#100e0c; border:1px solid var(--line); }
  .badge .ic { font-family:var(--serif); font-size:22px; color:#3b352b; line-height:1; }
  .badge.on { background:linear-gradient(165deg,#1d1811,#141110); border-color:var(--gold2); }
  .badge.on .ic { color:var(--gold-hi); }
  .badge .bt { font-size:10px; margin-top:6px; color:var(--muted); font-weight:500; letter-spacing:.02em; }
  .badge.on .bt { color:#e4dccd; }
  .badge .bd { font-size:8px; color:var(--muted); margin-top:2px; }

  /* 스탬프 */
  .stamps { display:grid; grid-template-columns:repeat(5,1fr); gap:9px; }
  .stamp { aspect-ratio:1; border-radius:50%; border:1px solid var(--line); display:flex; align-items:center;
    justify-content:center; font-size:15px; color:var(--muted); font-family:var(--serif); }
  .stamp.on { background:linear-gradient(160deg,#1d1811,#141110); border:1px solid var(--gold); color:var(--gold-hi); }

  /* 타임라인 */
  .tl { position:relative; padding-left:22px; }
  .tl::before { content:""; position:absolute; left:5px; top:4px; bottom:4px; width:1px; background:var(--line); }
  .tl-item { position:relative; padding:0 0 16px; }
  .tl-item::before { content:""; position:absolute; left:-19px; top:4px; width:7px; height:7px; border-radius:50%;
    background:var(--gold); box-shadow:0 0 0 3px var(--card2); }
  .tl-item:last-child { padding-bottom:0; }
  .tl-top { display:flex; justify-content:space-between; font-size:14px; font-weight:500; }
  .tl-sub { font-size:11px; color:var(--muted); margin-top:3px; letter-spacing:.04em; }
  .tl-earn { color:var(--gold); font-size:12px; font-weight:500; }

  /* 미션 */
  .mission { border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px; }
  .mission.done { border-color:var(--gold2); background:#141110; }
  .mission .top { display:flex; justify-content:space-between; font-size:14px; font-weight:500; }
  .mission .rw { color:var(--gold); font-size:12px; }
  .bar { height:5px; background:#0f0d0b; border-radius:99px; margin-top:10px; overflow:hidden; }
  .bar > i { display:block; height:100%; background:linear-gradient(90deg,var(--gold2),var(--gold-hi)); }
  .center { text-align:center; }
  #err { color:#d68b6b; }

  /* ── 로고 · 포일 · 인터랙션 ── */
  .topbrand { display:flex; align-items:center; justify-content:center; gap:11px; padding:2px 0 18px; }
  .brand { display:flex; align-items:center; gap:11px; }
  .mono { width:36px; height:36px; flex:0 0 auto;
    filter:drop-shadow(0 0 7px rgba(203,171,109,.30)); }
  .wm { font-family:var(--serif); font-weight:600; font-size:18px; letter-spacing:.16em;
    background:linear-gradient(100deg,#9c7e46 0%,#e7d5a6 42%,#fff6e0 50%,#e7d5a6 58%,#9c7e46 100%);
    background-size:220% auto; -webkit-background-clip:text; background-clip:text;
    color:transparent; animation:sheen 7s linear infinite; }
  .wm-sub { font-size:10px; letter-spacing:.28em; text-transform:uppercase; color:var(--muted);
    display:block; margin-top:3px; }
  @keyframes sheen { to { background-position:-220% center; } }
  @keyframes rise { from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:none;} }

  .card, .hero { animation:rise .5s ease both; }
  button, .cat, .pill, .mi, .lb-row, .badge, .chip, a, .stamp {
    transition:transform .16s ease, box-shadow .22s ease, border-color .22s ease,
      background .22s ease, filter .22s ease, color .2s ease; }
  button:not(:disabled):hover { transform:translateY(-1px); filter:brightness(1.05);
    box-shadow:0 8px 24px rgba(203,171,109,.20); }
  button:not(:disabled):active { transform:translateY(0) scale(.99); }
  .go, .pay, .confirm, .approve, .send { position:relative; overflow:hidden; }
  .go::after, .pay::after, .confirm::after, .approve::after, .send::after { content:"";
    position:absolute; top:0; left:-60%; width:42%; height:100%; transform:skewX(-18deg);
    background:linear-gradient(100deg,transparent,rgba(255,248,224,.55),transparent);
    transition:left .6s ease; pointer-events:none; }
  .go:hover::after, .pay:hover::after, .confirm:hover::after, .approve:hover::after, .send:hover::after { left:135%; }
  .lb-row:hover { background:rgba(203,171,109,.05); }
  .badge:hover { border-color:var(--gold2); transform:translateY(-1px); }
  .stamp.on { box-shadow:0 0 10px rgba(203,171,109,.15); }
  .points { text-shadow:0 2px 34px rgba(203,171,109,.28); }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#8a6f3e"/><stop offset=".35" stop-color="#e7d5a6"/>
    <stop offset=".52" stop-color="#fff6e0"/><stop offset=".72" stop-color="#c9a96a"/>
    <stop offset="1" stop-color="#8a6f3e"/>
  </linearGradient></defs></svg>
<div class="wrap">
  <div class="topbrand">
    <svg class="mono" viewBox="0 0 48 48" aria-label="Slowstep">
      <circle cx="24" cy="24" r="22" fill="none" stroke="url(#foil)" stroke-width="1.3"/>
      <circle cx="24" cy="24" r="18.4" fill="none" stroke="url(#foil)" stroke-width=".5" opacity=".55"/>
      <text x="24" y="32" text-anchor="middle" font-family="Noto Serif KR,Georgia,serif" font-size="23" font-weight="600" fill="url(#foil)">S</text>
    </svg>
    <span class="wm">SLOWSTEP</span>
  </div>
  <!-- 조회 폼 -->
  <div class="card" id="loginCard">
    <div class="eyebrow">SLOWSTEP MAISON</div>
    <h3 style="margin-top:8px;">멤버십</h3>
    <p class="muted">QR을 스캔하거나 연락처로 멤버십을 확인하세요.</p>
    <input id="phone" inputmode="numeric" placeholder="01012345678" />
    <button class="go" onclick="submitPhone()">멤버십 확인</button>
    <p class="muted center" style="margin-top:10px;" id="err"></p>
  </div>

  <div id="view" class="hidden">
    <!-- 히어로 -->
    <div class="hero">
      <div class="eyebrow">SLOWSTEP MEMBERSHIP</div>
      <div class="name" id="name">—</div>
      <span class="tier-badge" id="tier">—</span>
      <div class="points" id="points">0<span>P</span></div>
      <div class="hstats">
        <div>방문<b id="visits">0</b></div>
        <div>누적결제<b id="spent">0</b></div>
        <div>스탬프<b id="stampCount">0</b></div>
      </div>
    </div>

    <!-- 다음 등급 진행 링 -->
    <div class="card">
      <h3>등급 여정</h3>
      <div class="ring-wrap">
        <div class="ring">
          <svg width="92" height="92" viewBox="0 0 92 92">
            <circle cx="46" cy="46" r="40" fill="none" stroke="#2a241a" stroke-width="9"/>
            <circle id="ringFg" cx="46" cy="46" r="40" fill="none" stroke="url(#gg)" stroke-width="9"
              stroke-linecap="round" stroke-dasharray="251.2" stroke-dashoffset="251.2"/>
            <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#a5854c"/><stop offset="1" stop-color="#e7d5a6"/>
            </linearGradient></defs>
          </svg>
          <div class="pct"><b id="ringPct">0%</b><span>진행</span></div>
        </div>
        <div class="ring-info">
          <div class="big" id="ringTitle">—</div>
          <div class="sub" id="ringSub">—</div>
        </div>
      </div>
    </div>

    <!-- 단골 랭킹 -->
    <div class="card">
      <h3>단골 랭킹 <span class="muted" style="font-weight:400">· 누적 방문</span></h3>
      <div class="myrank">
        <span class="muted">내 순위</span>
        <span class="r" id="myRank">#-</span>
        <span class="pctl" id="myPctl">상위 -%</span>
      </div>
      <div id="leaderboard"></div>
    </div>

    <!-- 성취 배지 -->
    <div class="card">
      <h3>성취 배지 <span class="muted" style="font-weight:400" id="badgeCount"></span></h3>
      <div class="badges" id="badges"></div>
    </div>

    <!-- 스탬프 -->
    <div class="card">
      <h3>스탬프 적립 <span class="muted" style="font-weight:400" id="stampLabel"></span></h3>
      <div class="stamps" id="stamps"></div>
      <p class="muted" style="margin-top:10px;" id="stampHint"></p>
    </div>

    <!-- 방문 기록 타임라인 -->
    <div class="card">
      <h3>방문 기록</h3>
      <div class="tl" id="timeline"></div>
    </div>

    <!-- 미션 -->
    <div class="card">
      <h3>진행 중인 미션</h3>
      <div id="missions"></div>
    </div>

    <p class="muted center">결제 시 QR(연락처)을 제시하면 자동으로 적립됩니다.</p>
  </div>
</div>

<script>
  const API_BASE = location.origin.includes(":5500") ? "http://localhost:8000" : location.origin;
  const $ = (id) => document.getElementById(id);
  const won = (n) => (n||0).toLocaleString("ko-KR");
  const METHOD = { TOSS_CARD:"카드", TOSS_EASY:"간편결제", CASH:"현금" };

  async function api(path){
    const r = await fetch(API_BASE + path);
    const b = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(b.detail || ("오류 "+r.status));
    return b;
  }

  function submitPhone(){
    const p = $("phone").value.trim();
    if(!p) return;
    location.search = "?phone=" + encodeURIComponent(p);
  }

  async function load(phone){
    try {
      const m = await api("/api/v1/members/lookup?phone=" + encodeURIComponent(phone));
      const d = await api("/api/v1/members/" + m.id + "/dashboard");
      render(d);
    } catch(e){ $("err").textContent = "❌ " + e.message; }
  }

  function render(d){
    const m = d.member;
    $("loginCard").classList.add("hidden");
    $("view").classList.remove("hidden");

    // 히어로
    $("name").textContent = m.name + " 님";
    $("points").innerHTML = won(m.points) + "<span>P</span>";
    $("visits").textContent = m.visit_count;
    $("spent").textContent = won(m.total_spent);
    $("stampCount").textContent = m.stamps + "/" + m.stamp_goal;
    const tb = $("tier");
    tb.textContent = m.tier_display || m.tier;
    tb.className = "tier-badge t-" + m.tier;

    // 등급 링
    const nt = d.next_tier, C = 251.2;
    $("ringFg").style.strokeDashoffset = C * (1 - nt.progress_pct/100);
    $("ringPct").textContent = nt.progress_pct + "%";
    if(nt.is_max){
      $("ringTitle").textContent = "최고 등급 달성";
      $("ringSub").textContent = "골드 회원님, 최고의 단골이세요.";
    } else {
      $("ringTitle").textContent = nt.next + " 등급까지";
      $("ringSub").innerHTML = "앞으로 <b style='color:var(--gold)'>" + won(nt.remaining) + "원</b> 더 쓰면<br>" + nt.next + " 등급으로 올라가요";
    }

    // 랭킹
    $("myRank").textContent = "#" + d.ranking.rank;
    $("myPctl").textContent = "상위 " + d.ranking.percentile + "%";
    const medal = ["🥇","🥈","🥉"];
    $("leaderboard").innerHTML = d.ranking.leaderboard.map(x =>
      `<div class="lb-row ${x.is_me?"me":""}">
        <span class="lb-rank">${medal[x.rank-1] || x.rank}</span>
        <span class="lb-name">${x.nickname}${x.is_me?" (나)":""}</span>
        <span class="lb-val">${x.visits}회</span>
      </div>`
    ).join("");

    // 배지
    const earned = d.badges.filter(b=>b.earned).length;
    $("badgeCount").textContent = `· ${earned}/${d.badges.length}`;
    $("badges").innerHTML = d.badges.map(b =>
      `<div class="badge ${b.earned?"on":""}" title="${b.desc}">
        <div class="ic">${b.icon}</div><div class="bt">${b.title}</div>
        <div class="bd">${b.earned?"획득":b.desc}</div>
      </div>`
    ).join("");

    // 스탬프
    const goal = m.stamp_goal || 10;
    $("stampLabel").textContent = m.stamps + " / " + goal;
    let sh = "";
    for(let i=0;i<goal;i++) sh += `<div class="stamp ${i<m.stamps?"on":""}">${i<m.stamps?"◆":i+1}</div>`;
    $("stamps").innerHTML = sh;
    $("stampHint").textContent = goal-m.stamps>0 ? `${goal-m.stamps}잔 더 모으면 보상 포인트가 적립됩니다.` : "보상 적립이 완료되었습니다.";

    // 타임라인
    if(!d.timeline.length){
      $("timeline").innerHTML = '<p class="muted">아직 방문 기록이 없어요.</p>';
    } else {
      $("timeline").innerHTML = d.timeline.map(t=>{
        const dt = t.paid_at ? new Date(t.paid_at) : null;
        const label = dt ? `${dt.getMonth()+1}월 ${dt.getDate()}일` : "";
        return `<div class="tl-item">
          <div class="tl-top"><span>${won(t.net_amount)}원 · ${METHOD[t.payment_method]||""}</span>
            <span class="tl-earn">+${t.points_earned}P</span></div>
          <div class="tl-sub">${label}</div>
        </div>`;
      }).join("");
    }

    // 미션
    if(!d.missions.length){ $("missions").innerHTML = '<p class="muted">진행 중인 미션이 없습니다.</p>'; }
    else $("missions").innerHTML = d.missions.map(x=>{
      const pct = Math.min(100, Math.round(x.progress/x.target*100));
      return `<div class="mission ${x.is_completed?"done":""}">
        <div class="top"><span>${x.is_completed?"◆ ":""}${x.title}</span><span class="rw">+${x.reward_points}P</span></div>
        <div class="muted">${x.description||""}</div>
        <div class="bar"><i style="width:${pct}%"></i></div>
        <div class="muted" style="margin-top:5px;">${won(x.progress)} / ${won(x.target)}</div>
      </div>`;
    }).join("");
  }

  const phone = new URLSearchParams(location.search).get("phone");
  if(phone) load(phone);
</script>
</body>
</html>
