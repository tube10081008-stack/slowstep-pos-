<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>슬로우스텝 멤버십</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
  :root {
    --bg:#f4f6f9; --card:#ffffff; --card2:#f8fafc; --line:#e6e9ef; --txt:#161a25;
    --muted:#6b7280; --brand:#3b5bff; --brand-dk:#2846e6; --brand-soft:#eef2ff;
    --green:#16a34a; --amber:#f59e0b; --gold:#3b5bff;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 6px 20px rgba(16,24,40,.06);
    --sans:"Inter","Noto Sans KR",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--txt); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; }
  .wrap { max-width:460px; margin:0 auto; padding:22px 16px 64px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:20px; margin-bottom:14px; box-shadow:var(--shadow); }
  h3 { font-size:15px; font-weight:700; margin:0 0 16px; color:var(--txt); letter-spacing:-.01em; }
  .eyebrow { font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--brand); font-weight:600; }
  .muted { color:var(--muted); font-size:12px; }
  .hidden { display:none; }

  /* 로그인 */
  input { width:100%; background:#fff; border:1px solid var(--line); color:var(--txt);
    border-radius:10px; padding:14px; font-size:16px; margin-top:8px; font-family:var(--sans); }
  input:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-soft); }
  button.go { width:100%; border:0; border-radius:10px; padding:15px; font-weight:600; margin-top:12px;
    color:#fff; background:var(--brand); cursor:pointer; font-size:15px; }

  /* 히어로 */
  .hero { text-align:center; padding:30px 20px 22px; border-radius:18px; margin-bottom:14px; color:#fff;
    background:linear-gradient(135deg,#4b6bff 0%,#6a4cff 100%); box-shadow:0 10px 26px rgba(59,91,255,.28); }
  .hero .eyebrow { color:rgba(255,255,255,.75); }
  .hero .name { font-size:23px; font-weight:800; margin-top:6px; letter-spacing:-.01em; }
  .tier-badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:5px 13px;
    border-radius:999px; font-weight:600; margin-top:12px; background:rgba(255,255,255,.22); color:#fff; }
  .t-BRONZE, .t-SILVER, .t-GOLD { background:rgba(255,255,255,.22); color:#fff; }
  .points { font-size:46px; font-weight:800; margin-top:18px; color:#fff; letter-spacing:-.02em; line-height:1; }
  .points span { font-size:15px; color:rgba(255,255,255,.75); font-weight:500; margin-left:2px; }
  .hstats { display:flex; justify-content:space-around; margin-top:22px; padding-top:18px;
    border-top:1px solid rgba(255,255,255,.2); }
  .hstats div { font-size:11px; color:rgba(255,255,255,.7); }
  .hstats b { display:block; font-size:19px; font-weight:700; color:#fff; margin-top:5px; }

  /* 등급 진행 링 */
  .ring-wrap { display:flex; align-items:center; gap:18px; }
  .ring { position:relative; width:96px; height:96px; flex:0 0 96px; }
  .ring svg { transform:rotate(-90deg); }
  .ring .pct { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring .pct b { font-size:23px; font-weight:800; color:var(--brand); }
  .ring .pct span { font-size:9px; color:var(--muted); margin-top:2px; }
  .ring-info .big { font-size:16px; font-weight:700; }
  .ring-info .sub { font-size:12px; color:var(--muted); margin-top:5px; line-height:1.6; }

  /* 랭킹 */
  .myrank { display:flex; align-items:baseline; gap:10px; margin-bottom:14px; }
  .myrank .r { font-size:32px; font-weight:800; color:var(--brand); letter-spacing:-.02em; }
  .myrank .pctl { font-size:11px; color:var(--brand-dk); font-weight:600;
    background:var(--brand-soft); border:1px solid #dfe4ff; padding:4px 10px; border-radius:999px; }
  .lb-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; font-size:14px; }
  .lb-row.me { background:var(--brand-soft); border:1px solid #d5dcff; }
  .lb-rank { width:24px; text-align:center; font-weight:700; color:var(--muted); }
  .lb-name { flex:1; }
  .lb-val { color:var(--muted); font-size:12px; }
  .lb-row.me .lb-name { color:var(--brand-dk); font-weight:700; }

  /* 배지 */
  .badges { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .badge { text-align:center; padding:14px 4px; border-radius:12px; background:var(--card2); border:1px solid var(--line); }
  .badge .ic { font-size:22px; color:#c3c8d2; line-height:1; }
  .badge.on { background:var(--brand-soft); border-color:#d5dcff; }
  .badge.on .ic { color:var(--brand); }
  .badge .bt { font-size:10px; margin-top:6px; color:var(--muted); font-weight:500; }
  .badge.on .bt { color:var(--txt); }
  .badge .bd { font-size:8px; color:var(--muted); margin-top:2px; }

  /* 스탬프 */
  .stamps { display:grid; grid-template-columns:repeat(5,1fr); gap:9px; }
  .stamp { aspect-ratio:1; border-radius:50%; border:1.5px solid var(--line); display:flex; align-items:center;
    justify-content:center; font-size:15px; color:var(--muted); font-weight:600; }
  .stamp.on { background:var(--brand-soft); border:1.5px solid var(--brand); color:var(--brand); }

  /* 타임라인 */
  .tl { position:relative; padding-left:22px; }
  .tl::before { content:""; position:absolute; left:5px; top:4px; bottom:4px; width:1.5px; background:var(--line); }
  .tl-item { position:relative; padding:0 0 16px; }
  .tl-item::before { content:""; position:absolute; left:-19px; top:4px; width:8px; height:8px; border-radius:50%;
    background:var(--brand); box-shadow:0 0 0 3px var(--card); }
  .tl-item:last-child { padding-bottom:0; }
  .tl-top { display:flex; justify-content:space-between; font-size:14px; font-weight:600; }
  .tl-sub { font-size:11px; color:var(--muted); margin-top:3px; }
  .tl-earn { color:var(--green); font-size:12px; font-weight:600; }

  /* 미션 */
  .mission { border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px; }
  .mission.done { border-color:#bbf7d0; background:#f0fdf4; }
  .mission .top { display:flex; justify-content:space-between; font-size:14px; font-weight:600; }
  .mission .rw { color:var(--brand); font-size:12px; font-weight:600; }
  .bar { height:6px; background:var(--card2); border-radius:99px; margin-top:10px; overflow:hidden; }
  .bar > i { display:block; height:100%; background:linear-gradient(90deg,#5b76ff,var(--brand)); }
  .center { text-align:center; }
  #err { color:var(--red,#ef4444); }

  /* ── 로고 · 인터랙션 ── */
  .topbrand { display:flex; align-items:center; justify-content:center; gap:10px; padding:2px 0 18px; }
  .brand { display:flex; align-items:center; gap:11px; }
  .logo { width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,#5b76ff,var(--brand));
    color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:19px;
    flex:0 0 auto; box-shadow:0 4px 12px rgba(59,91,255,.3); }
  .wm { font-weight:800; font-size:19px; letter-spacing:-.01em; color:var(--txt); }
  .wm-sub { font-size:11px; color:var(--muted); display:block; margin-top:1px; font-weight:500; }
  @keyframes rise { from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:none;} }
  .card, .hero { animation:rise .4s ease both; }
  button, .lb-row, .badge, .stamp { transition:all .16s ease; }
  button:not(:disabled):hover { filter:brightness(1.05); box-shadow:0 6px 16px rgba(59,91,255,.22); }
  button:not(:disabled):active { transform:translateY(1px); }
  .badge:hover { border-color:#d5dcff; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbrand">
    <span class="logo">S</span>
    <span class="wm">Slowstep</span>
  </div>
  <!-- 조회 폼 -->
  <div class="card" id="loginCard">
    <div class="eyebrow">SLOWSTEP MAISON</div>
    <h3 style="margin-top:8px;">멤버십</h3>
    <p class="muted">QR을 스캔하거나 연락처로 멤버십을 확인하세요.</p>
    <input id="phone" inputmode="numeric" placeholder="01012345678" />
    <button class="go" onclick="submitPhone()">멤버십 확인</button>
    <p class="muted center" style="margin-top:10px;" id="err"></p>
  </div>

  <div id="view" class="hidden">
    <!-- 히어로 -->
    <div class="hero">
      <div class="eyebrow">SLOWSTEP MEMBERSHIP</div>
      <div class="name" id="name">—</div>
      <span class="tier-badge" id="tier">—</span>
      <div class="points" id="points">0<span>P</span></div>
      <div class="hstats">
        <div>방문<b id="visits">0</b></div>
        <div>누적결제<b id="spent">0</b></div>
        <div>스탬프<b id="stampCount">0</b></div>
      </div>
    </div>

    <!-- 다음 등급 진행 링 -->
    <div class="card">
      <h3>등급 여정</h3>
      <div class="ring-wrap">
        <div class="ring">
          <svg width="92" height="92" viewBox="0 0 92 92">
            <circle cx="46" cy="46" r="40" fill="none" stroke="#e6e9ef" stroke-width="9"/>
            <circle id="ringFg" cx="46" cy="46" r="40" fill="none" stroke="url(#gg)" stroke-width="9"
              stroke-linecap="round" stroke-dasharray="251.2" stroke-dashoffset="251.2"/>
            <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#5b76ff"/><stop offset="1" stop-color="#3b5bff"/>
            </linearGradient></defs>
          </svg>
          <div class="pct"><b id="ringPct">0%</b><span>진행</span></div>
        </div>
        <div class="ring-info">
          <div class="big" id="ringTitle">—</div>
          <div class="sub" id="ringSub">—</div>
        </div>
      </div>
    </div>

    <!-- 단골 랭킹 -->
    <div class="card">
      <h3>단골 랭킹 <span class="muted" style="font-weight:400">· 누적 방문</span></h3>
      <div class="myrank">
        <span class="muted">내 순위</span>
        <span class="r" id="myRank">#-</span>
        <span class="pctl" id="myPctl">상위 -%</span>
      </div>
      <div id="leaderboard"></div>
    </div>

    <!-- 성취 배지 -->
    <div class="card">
      <h3>성취 배지 <span class="muted" style="font-weight:400" id="badgeCount"></span></h3>
      <div class="badges" id="badges"></div>
    </div>

    <!-- 스탬프 -->
    <div class="card">
      <h3>스탬프 적립 <span class="muted" style="font-weight:400" id="stampLabel"></span></h3>
      <div class="stamps" id="stamps"></div>
      <p class="muted" style="margin-top:10px;" id="stampHint"></p>
    </div>

    <!-- 방문 기록 타임라인 -->
    <div class="card">
      <h3>방문 기록</h3>
      <div class="tl" id="timeline"></div>
    </div>

    <!-- 미션 -->
    <div class="card">
      <h3>진행 중인 미션</h3>
      <div id="missions"></div>
    </div>

    <p class="muted center">결제 시 QR(연락처)을 제시하면 자동으로 적립됩니다.</p>
  </div>
</div>

<script>
  const API_BASE = location.origin.includes(":5500") ? "http://localhost:8000" : location.origin;
  const $ = (id) => document.getElementById(id);
  const won = (n) => (n||0).toLocaleString("ko-KR");
  const METHOD = { TOSS_CARD:"카드", TOSS_EASY:"간편결제", CASH:"현금" };

  async function api(path){
    const r = await fetch(API_BASE + path);
    const b = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(b.detail || ("오류 "+r.status));
    return b;
  }

  function submitPhone(){
    const p = $("phone").value.trim();
    if(!p) return;
    location.search = "?phone=" + encodeURIComponent(p);
  }

  async function load(phone){
    try {
      const m = await api("/api/v1/members/lookup?phone=" + encodeURIComponent(phone));
      const d = await api("/api/v1/members/" + m.id + "/dashboard");
      render(d);
    } catch(e){ $("err").textContent = "❌ " + e.message; }
  }

  function render(d){
    const m = d.member;
    $("loginCard").classList.add("hidden");
    $("view").classList.remove("hidden");

    // 히어로
    $("name").textContent = m.name + " 님";
    $("points").innerHTML = won(m.points) + "<span>P</span>";
    $("visits").textContent = m.visit_count;
    $("spent").textContent = won(m.total_spent);
    $("stampCount").textContent = m.stamps + "/" + m.stamp_goal;
    const tb = $("tier");
    tb.textContent = m.tier_display || m.tier;
    tb.className = "tier-badge t-" + m.tier;

    // 등급 링
    const nt = d.next_tier, C = 251.2;
    $("ringFg").style.strokeDashoffset = C * (1 - nt.progress_pct/100);
    $("ringPct").textContent = nt.progress_pct + "%";
    if(nt.is_max){
      $("ringTitle").textContent = "최고 등급 달성";
      $("ringSub").textContent = "골드 회원님, 최고의 단골이세요.";
    } else {
      $("ringTitle").textContent = nt.next + " 등급까지";
      $("ringSub").innerHTML = "앞으로 <b style='color:var(--gold)'>" + won(nt.remaining) + "원</b> 더 쓰면<br>" + nt.next + " 등급으로 올라가요";
    }

    // 랭킹
    $("myRank").textContent = "#" + d.ranking.rank;
    $("myPctl").textContent = "상위 " + d.ranking.percentile + "%";
    const medal = ["🥇","🥈","🥉"];
    $("leaderboard").innerHTML = d.ranking.leaderboard.map(x =>
      `<div class="lb-row ${x.is_me?"me":""}">
        <span class="lb-rank">${medal[x.rank-1] || x.rank}</span>
        <span class="lb-name">${x.nickname}${x.is_me?" (나)":""}</span>
        <span class="lb-val">${x.visits}회</span>
      </div>`
    ).join("");

    // 배지
    const earned = d.badges.filter(b=>b.earned).length;
    $("badgeCount").textContent = `· ${earned}/${d.badges.length}`;
    $("badges").innerHTML = d.badges.map(b =>
      `<div class="badge ${b.earned?"on":""}" title="${b.desc}">
        <div class="ic">${b.icon}</div><div class="bt">${b.title}</div>
        <div class="bd">${b.earned?"획득":b.desc}</div>
      </div>`
    ).join("");

    // 스탬프
    const goal = m.stamp_goal || 10;
    $("stampLabel").textContent = m.stamps + " / " + goal;
    let sh = "";
    for(let i=0;i<goal;i++) sh += `<div class="stamp ${i<m.stamps?"on":""}">${i<m.stamps?"◆":i+1}</div>`;
    $("stamps").innerHTML = sh;
    $("stampHint").textContent = goal-m.stamps>0 ? `${goal-m.stamps}잔 더 모으면 보상 포인트가 적립됩니다.` : "보상 적립이 완료되었습니다.";

    // 타임라인
    if(!d.timeline.length){
      $("timeline").innerHTML = '<p class="muted">아직 방문 기록이 없어요.</p>';
    } else {
      $("timeline").innerHTML = d.timeline.map(t=>{
        const dt = t.paid_at ? new Date(t.paid_at) : null;
        const label = dt ? `${dt.getMonth()+1}월 ${dt.getDate()}일` : "";
        return `<div class="tl-item">
          <div class="tl-top"><span>${won(t.net_amount)}원 · ${METHOD[t.payment_method]||""}</span>
            <span class="tl-earn">+${t.points_earned}P</span></div>
          <div class="tl-sub">${label}</div>
        </div>`;
      }).join("");
    }

    // 미션
    if(!d.missions.length){ $("missions").innerHTML = '<p class="muted">진행 중인 미션이 없습니다.</p>'; }
    else $("missions").innerHTML = d.missions.map(x=>{
      const pct = Math.min(100, Math.round(x.progress/x.target*100));
      return `<div class="mission ${x.is_completed?"done":""}">
        <div class="top"><span>${x.is_completed?"◆ ":""}${x.title}</span><span class="rw">+${x.reward_points}P</span></div>
        <div class="muted">${x.description||""}</div>
        <div class="bar"><i style="width:${pct}%"></i></div>
        <div class="muted" style="margin-top:5px;">${won(x.progress)} / ${won(x.target)}</div>
      </div>`;
    }).join("");
  }

  const phone = new URLSearchParams(location.search).get("phone");
  if(phone) load(phone);
</script>
</body>
</html>
