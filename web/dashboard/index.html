<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>슬로우스텝 · 점주 대시보드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0a0908; --card:#151312; --line:#2a251f; --hair:rgba(203,171,109,.20); --txt:#ece6da;
    --muted:#8b8274; --accent:#cbab6d; --green:#a3b89c; --gold:#cbab6d; --gold-hi:#e7d5a6;
    --gold2:#a5854c; --coffee:#b7966a; --red:#d68b6b;
    --serif:"Noto Serif KR", Georgia, serif;
    --sans:"Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:radial-gradient(110% 45% at 50% -6%, #171310 0%, var(--bg) 55%), var(--bg);
    color:var(--txt); font-family:var(--sans); letter-spacing:.01em; }
  h1, h3, .kpi .val, .bars, .b-GOLD { font-family:inherit; }
  header h1, h3 { font-family:var(--serif); font-weight:600; letter-spacing:.02em; }
  .kpi .val { font-family:var(--serif); font-weight:600; }
  .wrap { max-width:1080px; margin:0 auto; padding:20px 18px 60px; }
  header { display:flex; align-items:baseline; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
  header h1 { font-size:20px; margin:0; }
  header .sub { color:var(--muted); font-size:13px; }
  .grid { display:grid; gap:14px; }
  .kpis { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; }
  .kpi .label { font-size:12px; color:var(--muted); }
  .kpi .val { font-size:26px; font-weight:800; margin-top:6px; color:var(--gold); }
  .kpi .foot { font-size:12px; color:var(--muted); margin-top:4px; }
  .cols { grid-template-columns:1.4fr 1fr; align-items:start; }
  @media (max-width:820px){ .cols{ grid-template-columns:1fr; } }
  h3 { font-size:15px; margin:0 0 14px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:8px 6px; border-bottom:1px solid var(--line); }
  th { color:var(--muted); font-weight:600; font-size:12px; }
  .badge { font-size:11px; padding:2px 8px; border-radius:999px; font-weight:700; }
  .b-BRONZE{ background:#6b45248c; color:#e6b98a; } .b-SILVER{ background:#5f6b7d8c; color:#dbe6f2; }
  .b-GOLD{ background:linear-gradient(135deg,#f5c542,#b9832a); color:#3a2606; }
  .bars { display:flex; align-items:flex-end; gap:5px; height:120px; }
  .bars .b { flex:1; background:linear-gradient(180deg,var(--gold),var(--coffee));
    border-radius:4px 4px 0 0; min-height:3px; position:relative; }
  .bars .b span { position:absolute; bottom:-18px; left:50%; transform:translateX(-50%);
    font-size:9px; color:var(--muted); white-space:nowrap; }
  .tier-bar { display:flex; height:14px; border-radius:7px; overflow:hidden; margin:10px 0; }
  .tier-bar i { display:block; height:100%; }
  .legend { display:flex; gap:14px; font-size:12px; color:var(--muted); flex-wrap:wrap; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; }
  label { display:block; font-size:12px; color:var(--muted); margin:10px 0 5px; }
  input, select, textarea { width:100%; background:#120f0b; border:1px solid var(--line);
    color:var(--txt); border-radius:11px; padding:10px; font-size:14px; font-family:inherit; }
  textarea { min-height:96px; resize:vertical; }
  .frow { display:flex; gap:10px; } .frow > * { flex:1; }
  button { border:0; border-radius:11px; padding:11px 14px; font-weight:700; cursor:pointer;
    color:#1a1206; background:linear-gradient(135deg,var(--gold),var(--gold2)); font-size:14px; }
  button.send { background:linear-gradient(135deg,#6fce8e,var(--green)); color:#0c2414;
    width:100%; margin-top:12px; padding:13px; font-size:15px; }
  button.ghost { background:#241d13; border:1px solid var(--line); color:var(--txt); font-weight:600; }
  button:disabled { opacity:.5; }
  .preview-box { background:#120f0b; border:1px solid var(--line); border-radius:11px;
    padding:12px; margin-top:10px; font-size:13px; }
  .chip { display:inline-block; font-size:11px; background:#241d13; border:1px solid var(--line);
    border-radius:6px; padding:3px 7px; margin:2px 3px 0 0; cursor:pointer; }
  .kakao { background:#fee500; color:#191600; border-radius:12px; padding:12px 14px;
    font-size:13px; white-space:pre-wrap; line-height:1.55; margin-top:10px; }
  .muted { color:var(--muted); font-size:12px; }
  .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#241d13;
    border:1px solid var(--line); padding:12px 18px; border-radius:12px; font-size:14px; display:none; z-index:9; }
  .result { margin-top:12px; font-size:13px; }
  .pill { display:inline-block; font-size:12px; padding:5px 10px; border-radius:999px;
    background:#241d13; border:1px solid var(--line); margin-right:6px; }
  .ok{ color:var(--green); } .skip{ color:var(--gold); } .fail{ color:var(--red); }
  nav a { color:var(--muted); font-size:13px; text-decoration:none; margin-left:14px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>슬로우스텝 대시보드</h1>
    <span class="sub" id="sub">고객 데이터는 우리 것 — payhere 동의 없이 직접 마케팅</span>
    <nav style="margin-left:auto">
      <a href="../pos/">POS ↗</a><a href="../member/">멤버십 ↗</a>
    </nav>
  </header>

  <!-- KPI -->
  <div class="grid kpis" id="kpis"></div>

  <div class="grid cols" style="margin-top:14px;">
    <!-- 매출 추세 -->
    <div class="card">
      <h3>최근 14일 매출</h3>
      <div class="bars" id="trend"></div>
      <div style="height:22px"></div>
    </div>
    <!-- 등급 분포 -->
    <div class="card">
      <h3>등급 분포</h3>
      <div class="tier-bar" id="tierBar"></div>
      <div class="legend" id="tierLegend"></div>
    </div>
  </div>

  <div class="grid cols" style="margin-top:14px;">
    <!-- 상위 고객 -->
    <div class="card">
      <h3>우수 고객 TOP 5</h3>
      <table><thead><tr><th>이름</th><th>등급</th><th>누적결제</th><th>방문</th><th>포인트</th></tr></thead>
      <tbody id="topMembers"></tbody></table>
    </div>
    <!-- 최근 결제 -->
    <div class="card">
      <h3>최근 결제</h3>
      <table><thead><tr><th>고객</th><th>결제</th><th>적립</th><th>수단</th></tr></thead>
      <tbody id="recentTx"></tbody></table>
    </div>
  </div>

  <!-- 마케팅 발송 -->
  <div class="card" style="margin-top:14px;">
    <h3>마케팅 알림톡 발송</h3>
    <div class="grid cols">
      <!-- 세그먼트 빌더 -->
      <div>
        <label>① 저장된 세그먼트 불러오기</label>
        <select id="segSelect" onchange="loadSegment()">
          <option value="">— 직접 조건 설정 —</option>
        </select>
        <div class="frow">
          <div><label>등급</label>
            <select id="fTier" onchange="preview()">
              <option value="">전체</option><option value="BRONZE">브론즈</option>
              <option value="SILVER">실버</option><option value="GOLD">골드</option>
            </select>
          </div>
          <div><label>최소 방문</label><input id="fVisits" type="number" value="0" min="0" oninput="preview()" /></div>
        </div>
        <div class="frow">
          <div><label>최소 누적결제</label><input id="fSpent" type="number" value="0" min="0" oninput="preview()" /></div>
          <div><label>휴면(일 이상 미방문)</label><input id="fInactive" type="number" value="0" min="0" oninput="preview()" /></div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;flex-direction:row;margin-top:12px;">
          <input id="fOptIn" type="checkbox" checked style="width:auto" onchange="preview()" />
          마케팅 수신 동의자만 (광고성 필수)
        </label>
        <div class="preview-box" id="previewBox">대상 계산 중…</div>
      </div>

      <!-- 메시지 작성 -->
      <div>
        <label>② 캠페인명</label>
        <input id="campName" placeholder="예: 휴면 고객 컴백 쿠폰" value="이번 주 한정 혜택" />
        <label>③ 메시지 (변수 클릭 삽입)</label>
        <div>
          <span class="chip" onclick="insertVar('{이름}')">{이름}</span>
          <span class="chip" onclick="insertVar('{포인트}')">{포인트}</span>
          <span class="chip" onclick="insertVar('{등급}')">{등급}</span>
          <span class="chip" onclick="insertVar('{스탬프}')">{스탬프}</span>
          <span class="chip" onclick="insertVar('{방문}')">{방문}</span>
        </div>
        <textarea id="msg" oninput="renderPreview()">{이름}님 안녕하세요 ☕ 슬로우스텝입니다.
보유 포인트 {포인트}P로 이번 주 따뜻한 한 잔 어떠세요?
{등급} 등급 고객님께 아메리카노 1+1 혜택!</textarea>
        <label style="display:flex;align-items:center;gap:8px;flex-direction:row;margin-top:6px;">
          <input id="isAd" type="checkbox" checked style="width:auto" onchange="renderPreview()" />
          광고성 메시지 ((광고) 표기 + 수신거부 자동 부가)
        </label>
        <div class="muted" style="margin-top:8px;">미리보기 (첫 대상 기준)</div>
        <div class="kakao" id="kakaoPreview">—</div>
        <button class="send" id="sendBtn" onclick="sendCampaign()">발송하기</button>
        <div class="result" id="sendResult"></div>
      </div>
    </div>
  </div>

  <p class="muted" style="text-align:center;margin-top:18px;">
    알림톡 키 미설정 시 Mock 발송 — 세그먼트·치환·수신거부 로직 전체 검증 가능</p>
</div>

<div class="toast" id="toast"></div>

<script>
  const API_BASE = location.origin.includes(":5500") ? "http://localhost:8000" : location.origin;
  const $ = (id) => document.getElementById(id);
  const won = (n) => "₩" + (n||0).toLocaleString("ko-KR");
  const num = (n) => (n||0).toLocaleString("ko-KR");
  const TIER_LABEL = { BRONZE:"브론즈", SILVER:"실버", GOLD:"골드" };
  const TIER_COLOR = { BRONZE:"#7c4a21", SILVER:"#5b6b7d", GOLD:"#a87b14" };
  let firstSample = null, segments = [];

  function toast(m){ const t=$("toast"); t.textContent=m; t.style.display="block";
    clearTimeout(t._t); t._t=setTimeout(()=>t.style.display="none",2600); }

  async function api(path, opts){
    const r = await fetch(API_BASE+path, { headers:{"Content-Type":"application/json"}, ...opts });
    const b = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(b.detail || ("오류 "+r.status));
    return b;
  }

  async function loadDashboard(){
    const d = await api("/api/v1/dashboard/stats");
    // KPI
    $("kpis").innerHTML = [
      ["회원 수", num(d.members.total), `최근 30일 +${d.members.new_30d}명`],
      ["총 매출", won(d.revenue.total), `30일 ${won(d.revenue.revenue_30d)}`],
      ["객단가", won(d.revenue.avg_basket), `누적 ${num(d.revenue.tx_count)}건`],
      ["활성 고객(30일)", num(d.members.active_30d), `전체의 ${d.members.total?Math.round(d.members.active_30d/d.members.total*100):0}%`],
      ["마케팅 동의율", d.members.opt_in_rate+"%", `발송가능 ${num(d.members.opt_in)}명`],
      ["포인트 부채", num(d.points_outstanding)+"P", "미사용 적립금"],
    ].map(([l,v,f])=>`<div class="card kpi"><div class="label">${l}</div>
      <div class="val">${v}</div><div class="foot">${f}</div></div>`).join("");

    // 매출 추세
    const max = Math.max(1, ...d.trend_14d.map(t=>t.revenue));
    $("trend").innerHTML = d.trend_14d.map(t=>
      `<div class="b" style="height:${Math.round(t.revenue/max*100)}%" title="${t.date} ${won(t.revenue)}"><span>${t.date}</span></div>`
    ).join("");

    // 등급 분포
    const tb = d.members.tier_breakdown, tot = d.members.total || 1;
    $("tierBar").innerHTML = ["GOLD","SILVER","BRONZE"].map(k=>{
      const c = tb[k]||0; return c? `<i style="width:${c/tot*100}%;background:${TIER_COLOR[k]}"></i>`:"";
    }).join("");
    $("tierLegend").innerHTML = ["GOLD","SILVER","BRONZE"].map(k=>
      `<span><span class="dot" style="background:${TIER_COLOR[k]}"></span>${TIER_LABEL[k]} ${tb[k]||0}명</span>`
    ).join("");

    // TOP 고객
    $("topMembers").innerHTML = d.top_members.map(m=>
      `<tr><td>${m.name}</td><td><span class="badge b-${m.tier}">${TIER_LABEL[m.tier]}</span></td>
       <td>${won(m.total_spent)}</td><td>${m.visit_count}</td><td>${num(m.points)}P</td></tr>`
    ).join("");

    // 최근 결제
    const METHOD = {TOSS_CARD:"카드",TOSS_EASY:"간편결제",CASH:"현금"};
    $("recentTx").innerHTML = d.recent_transactions.map(t=>
      `<tr><td>${t.member__name||"비회원"}</td><td>${won(t.net_amount)}</td>
       <td>+${t.points_earned}P</td><td>${METHOD[t.payment_method]||t.payment_method}</td></tr>`
    ).join("");
  }

  async function loadSegments(){
    segments = await api("/api/v1/segments");
    $("segSelect").innerHTML = '<option value="">— 직접 조건 설정 —</option>' +
      segments.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");
  }

  function loadSegment(){
    const id = $("segSelect").value;
    const s = segments.find(x=>String(x.id)===id);
    if(!s){ return; }
    $("fTier").value = s.tier||""; $("fVisits").value = s.min_visits;
    $("fSpent").value = s.min_spent; $("fInactive").value = s.inactive_days;
    $("fOptIn").checked = s.require_opt_in;
    if(!$("campName").value || $("campName").dataset.auto) {
      $("campName").value = s.name; $("campName").dataset.auto = "1";
    }
    preview();
  }

  function filters(){
    return {
      tier: $("fTier").value,
      min_visits: parseInt($("fVisits").value||"0",10),
      min_spent: parseInt($("fSpent").value||"0",10),
      inactive_days: parseInt($("fInactive").value||"0",10),
      require_opt_in: $("fOptIn").checked,
    };
  }

  let pvTimer;
  function preview(){ clearTimeout(pvTimer); pvTimer = setTimeout(doPreview, 250); }
  async function doPreview(){
    try {
      const r = await api("/api/v1/segments/preview", { method:"POST", body: JSON.stringify(filters()) });
      firstSample = r.sample[0] || null;
      const names = r.sample.slice(0,5).map(m=>m.name).join(", ");
      $("previewBox").innerHTML = `대상 <b style="font-size:16px">${r.count}명</b>` +
        (r.count? `<div class="muted" style="margin-top:6px;">${names}${r.count>5?" 외 "+(r.count-5)+"명":""}</div>`:"");
      renderPreview();
    } catch(e){ $("previewBox").textContent = "오류: "+e.message; }
  }

  function insertVar(v){
    const ta = $("msg"); const s = ta.selectionStart;
    ta.value = ta.value.slice(0,s) + v + ta.value.slice(ta.selectionEnd);
    ta.focus(); renderPreview();
  }

  function renderPreview(){
    let body = $("msg").value;
    const m = firstSample;
    if(m){
      body = body.replace(/{이름}/g,m.name).replace(/{포인트}/g,num(m.points))
        .replace(/{등급}/g,TIER_LABEL[m.tier]).replace(/{스탬프}/g,m.stamps).replace(/{방문}/g,m.visit_count);
    }
    if($("isAd").checked) body = "(광고) "+body+"\n\n무료수신거부 080-000-0000";
    $("kakaoPreview").textContent = body || "—";
  }

  async function sendCampaign(){
    const f = filters();
    if(!$("campName").value.trim()) return toast("캠페인명을 입력하세요");
    $("sendBtn").disabled = true; $("sendBtn").textContent = "발송 중…";
    try {
      // 1) 세그먼트 저장 → 2) 캠페인 생성 → 3) 발송
      const seg = await api("/api/v1/segments", { method:"POST", body: JSON.stringify({
        name: $("campName").value + " 대상", ...f }) });
      const camp = await api("/api/v1/campaigns", { method:"POST", body: JSON.stringify({
        name: $("campName").value, segment: seg.id,
        message_template: $("msg").value, is_ad: $("isAd").checked }) });
      const res = await api(`/api/v1/campaigns/${camp.id}/send`, { method:"POST" });
      $("sendResult").innerHTML =
        `<span class="pill">대상 ${res.recipient_count}</span>` +
        `<span class="pill ok">성공 ${res.sent_count}</span>` +
        `<span class="pill skip">제외 ${res.skipped_count}</span>` +
        `<span class="pill fail">실패 ${res.failed_count}</span>`;
      toast("발송 완료");
      loadDashboard(); loadSegments();
    } catch(e){ toast("❌ "+e.message); }
    finally { $("sendBtn").disabled=false; $("sendBtn").textContent="발송하기"; }
  }

  (async ()=>{
    try { await loadDashboard(); await loadSegments(); doPreview(); }
    catch(e){ $("sub").textContent = "백엔드 연결 안됨: "+e.message; }
  })();
</script>
</body>
</html>
