<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>슬로우스텝 · 주문 POS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0a0908; --card:#121110; --card2:#151312; --line:#2a251f; --hair:rgba(203,171,109,.20);
    --txt:#ece6da; --muted:#8b8274; --gold:#cbab6d; --gold-hi:#e7d5a6; --gold2:#a5854c;
    --coffee:#b7966a; --accent:#cbab6d; --green:#a3b89c;
    --serif:"Noto Serif KR", Georgia, serif;
    --sans:"Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:radial-gradient(140% 50% at 50% -8%, #171310 0%, var(--bg) 55%), var(--bg);
    color:var(--txt); font-family:var(--sans); letter-spacing:.01em; }
  h1, h2, .term-amt .amt, .amt, .total b, .mcard .nm, .cart h3, .mi .pr, .ctot, .cartTotal {
    font-family:var(--serif); font-weight:600; }
  header h1 { font-weight:600; letter-spacing:.02em; }
  .wrap { max-width:1000px; margin:0 auto; padding:14px 14px 40px; }
  header { display:flex; align-items:center; gap:10px; padding:6px 2px 14px; }
  header h1 { font-size:18px; margin:0; }
  header .tag { font-size:11px; color:var(--muted); border:1px solid var(--line); padding:2px 8px; border-radius:999px; }
  header nav { margin-left:auto; }
  header nav a { color:var(--muted); font-size:12px; text-decoration:none; margin-left:12px; }
  .muted { color:var(--muted); font-size:12px; }
  .hidden { display:none; }

  /* ── 주문 레이아웃 ── */
  .order { display:grid; grid-template-columns:1fr 340px; gap:14px; align-items:start; }
  @media (max-width:800px){ .order { grid-template-columns:1fr; } }
  .card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:14px; }

  .cats { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .cat { font-size:13px; padding:8px 14px; border-radius:999px; background:#241d13;
    border:1px solid var(--line); cursor:pointer; color:var(--txt); font-weight:600; }
  .cat.on { background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#1a1206; border-color:var(--gold2); }

  .menu { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; }
  .mi { background:var(--card2); border:1px solid var(--line); border-radius:14px; padding:14px 10px;
    cursor:pointer; text-align:center; transition:transform .05s, border-color .1s; position:relative; }
  .mi:active { transform:scale(.96); }
  .mi.sel { border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset; }
  .mi .emo { font-size:28px; filter:saturate(.7) brightness(.95); }
  .mi .nm { font-size:13px; font-weight:600; margin-top:6px; line-height:1.3; }
  .mi .pr { font-size:12px; color:var(--gold); margin-top:4px; font-weight:700; }
  .mi .qty { position:absolute; top:-8px; right:-8px; background:var(--gold); color:#1a1206;
    font-size:12px; font-weight:800; min-width:22px; height:22px; border-radius:999px;
    display:flex; align-items:center; justify-content:center; padding:0 5px; }

  /* ── 장바구니 ── */
  .cart { position:sticky; top:14px; }
  .cart h3 { font-size:15px; margin:0 0 12px; display:flex; justify-content:space-between; }
  .cart .clear { font-size:12px; color:var(--muted); cursor:pointer; font-weight:400; }
  .empty { color:var(--muted); font-size:13px; text-align:center; padding:30px 0; }
  .ci { display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid var(--line); }
  .ci .cn { flex:1; font-size:14px; }
  .ci .cn small { display:block; color:var(--muted); font-size:11px; }
  .stepper { display:flex; align-items:center; gap:8px; }
  .stepper button { width:28px; height:28px; border-radius:8px; border:1px solid var(--line);
    background:#241d13; color:var(--txt); font-size:16px; font-weight:700; cursor:pointer; padding:0; }
  .stepper b { min-width:18px; text-align:center; font-size:14px; }
  .ctot { text-align:right; font-size:13px; width:64px; color:var(--gold); font-weight:700; }
  .total { display:flex; justify-content:space-between; align-items:baseline; margin:14px 0 4px; }
  .total b { font-size:26px; color:var(--gold); font-weight:900; }
  button.pay { width:100%; border:0; border-radius:12px; padding:15px; font-size:16px; font-weight:800;
    margin-top:10px; cursor:pointer; color:#1a1206; background:linear-gradient(135deg,var(--gold),var(--gold2)); }
  button.pay:disabled { opacity:.4; }

  /* ── 결제 단말 화면 ── */
  .terminal { max-width:440px; margin:0 auto; }
  .term-amt { text-align:center; padding:8px 0 16px; }
  .term-amt .lbl { font-size:13px; color:var(--muted); }
  .term-amt .amt { font-size:40px; font-weight:900; color:var(--gold); }
  .term-msg { text-align:center; font-size:15px; font-weight:600; margin-bottom:6px; }
  .phone-disp { text-align:center; font-size:30px; font-weight:800; letter-spacing:2px; padding:12px;
    background:#120f0b; border:1px solid var(--line); border-radius:12px; margin:12px 0; min-height:58px; }
  .phone-disp .ph { color:var(--muted); }
  .keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .keypad button { background:#241d13; border:1px solid var(--line); color:var(--txt); font-size:22px;
    font-weight:700; padding:16px; border-radius:12px; cursor:pointer; }
  .keypad button:active { background:#2f2617; }
  .row { display:flex; gap:8px; margin-top:10px; }
  .row > * { flex:1; }
  button.ghost { background:#241d13; border:1px solid var(--line); color:var(--txt);
    border-radius:12px; padding:14px; font-weight:600; cursor:pointer; font-size:14px; }
  button.confirm { border:0; border-radius:12px; padding:14px; font-weight:800; cursor:pointer;
    color:#1a1206; background:linear-gradient(135deg,var(--gold),var(--gold2)); font-size:15px; }
  button.approve { border:0; border-radius:12px; padding:16px; font-weight:800; cursor:pointer;
    color:#0c2414; background:linear-gradient(135deg,#6fce8e,var(--green)); font-size:17px; width:100%; margin-top:12px; }
  button:disabled { opacity:.45; }

  .mcard { background:linear-gradient(160deg,#241c12,#17120c); border:1px solid var(--line);
    border-radius:16px; padding:16px; text-align:center; margin-bottom:12px; }
  .mcard .nm { font-size:18px; font-weight:800; }
  .mcard .pts { font-size:14px; color:var(--gold); margin-top:4px; }
  .badge { font-size:11px; padding:3px 9px; border-radius:999px; font-weight:700; }
  .b-BRONZE{ background:#6b45248c; color:#e6b98a; } .b-SILVER{ background:#5f6b7d8c; color:#dbe6f2; }
  .b-GOLD{ background:linear-gradient(135deg,#f5c542,#b9832a); color:#3a2606; }
  label { display:block; font-size:12px; color:var(--muted); margin:12px 0 6px; }
  input { width:100%; background:#120f0b; border:1px solid var(--line); color:var(--txt);
    border-radius:11px; padding:12px; font-size:16px; }
  .pill-row { display:flex; gap:6px; margin-top:8px; }
  .pill { flex:1; text-align:center; font-size:13px; padding:10px; border-radius:10px; background:#241d13;
    border:1px solid var(--line); cursor:pointer; }
  .pill.on { background:linear-gradient(135deg,var(--gold),var(--gold2)); border-color:var(--gold2); color:#1a1206; font-weight:700; }

  /* ── 완료 화면 ── */
  .done { max-width:440px; margin:0 auto; text-align:center; }
  .done .ok { font-size:52px; color:var(--gold-hi); font-family:var(--serif); }
  .done h2 { margin:8px 0 2px; }
  .receipt { text-align:left; margin:16px 0; }
  .receipt .r { display:flex; justify-content:space-between; font-size:14px; padding:6px 0; border-bottom:1px dashed var(--line); }
  .reward { background:#141f11; border:1px solid #3a5d2f; border-radius:10px; padding:10px 12px; margin-top:8px; font-size:14px; }

  .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#241d13;
    border:1px solid var(--line); padding:12px 18px; border-radius:12px; font-size:14px; display:none; z-index:9; }

  /* ── 로고 · 포일 · 인터랙션 ── */
  .brand { display:flex; align-items:center; gap:11px; }
  .mono { width:34px; height:34px; flex:0 0 auto; filter:drop-shadow(0 0 7px rgba(203,171,109,.30)); }
  .wm { font-family:var(--serif); font-weight:600; font-size:17px; letter-spacing:.16em; line-height:1;
    background:linear-gradient(100deg,#9c7e46 0%,#e7d5a6 42%,#fff6e0 50%,#e7d5a6 58%,#9c7e46 100%);
    background-size:220% auto; -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:sheen 7s linear infinite; }
  .wm-sub { font-size:9px; letter-spacing:.26em; text-transform:uppercase; color:var(--muted); display:block; margin-top:3px; }
  @keyframes sheen { to { background-position:-220% center; } }
  @keyframes rise { from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:none;} }

  .card { animation:rise .5s ease both; }
  button, .cat, .pill, .mi, a, .stepper button { transition:transform .16s ease, box-shadow .22s ease,
    border-color .22s ease, background .22s ease, filter .22s ease, color .2s ease; }
  button:not(:disabled):hover { transform:translateY(-1px); filter:brightness(1.05); box-shadow:0 8px 24px rgba(203,171,109,.20); }
  button:not(:disabled):active { transform:translateY(0) scale(.99); }
  .mi:hover { border-color:var(--gold2); box-shadow:0 8px 22px rgba(0,0,0,.45); transform:translateY(-2px); }
  .cat:hover, .pill:hover { border-color:var(--gold2); }
  .pay, .confirm, .approve, .go { position:relative; overflow:hidden; }
  .pay::after, .confirm::after, .approve::after, .go::after { content:""; position:absolute; top:0; left:-60%;
    width:42%; height:100%; transform:skewX(-18deg); pointer-events:none;
    background:linear-gradient(100deg,transparent,rgba(255,248,224,.55),transparent); transition:left .6s ease; }
  .pay:hover::after, .confirm:hover::after, .approve:hover::after, .go:hover::after { left:135%; }
  .amount, .term-amt .amt { text-shadow:0 2px 30px rgba(203,171,109,.22); }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#8a6f3e"/><stop offset=".35" stop-color="#e7d5a6"/>
    <stop offset=".52" stop-color="#fff6e0"/><stop offset=".72" stop-color="#c9a96a"/>
    <stop offset="1" stop-color="#8a6f3e"/>
  </linearGradient></defs></svg>
<div class="wrap">
  <header>
    <div class="brand">
      <svg class="mono" viewBox="0 0 48 48" aria-label="Slowstep">
        <circle cx="24" cy="24" r="22" fill="none" stroke="url(#foil)" stroke-width="1.3"/>
        <circle cx="24" cy="24" r="18.4" fill="none" stroke="url(#foil)" stroke-width=".5" opacity=".55"/>
        <text x="24" y="32" text-anchor="middle" font-family="Noto Serif KR,Georgia,serif" font-size="23" font-weight="600" fill="url(#foil)">S</text>
      </svg>
      <div><span class="wm">SLOWSTEP</span><span class="wm-sub">주문 · POS</span></div>
    </div>
    <span class="tag" id="storeTag">로딩…</span>
    <nav><a href="../dashboard/">대시보드 ↗</a><a href="../member/">멤버십 ↗</a></nav>
  </header>

  <!-- ① 주문 화면 -->
  <div id="orderView">
    <div class="order">
      <div class="card">
        <div class="cats" id="cats"></div>
        <div class="menu" id="menu"></div>
      </div>
      <div class="card cart">
        <h3>주문 내역 <span class="clear" onclick="clearCart()">비우기</span></h3>
        <div id="cartList"><div class="empty">메뉴를 담아주세요</div></div>
        <div class="total"><span class="muted">합계</span><b id="cartTotal">0원</b></div>
        <button class="pay" id="payBtn" disabled onclick="goPay()">결제하기</button>
      </div>
    </div>
  </div>

  <!-- ② 결제 단말 화면 -->
  <div id="payView" class="hidden">
    <div class="card terminal">
      <div class="term-amt"><div class="lbl">결제 금액</div><div class="amt" id="termAmt">0원</div></div>

      <!-- 2-1. 고객번호 입력 (단말기 시뮬레이션) -->
      <div id="phoneStep">
        <div class="term-msg">고객님, 단말기에 <b>고객번호(연락처)</b>를 입력해 주세요</div>
        <div class="phone-disp" id="phoneDisp"><span class="ph">01000000000</span></div>
        <div class="keypad" id="keypad"></div>
        <div class="row">
          <button class="ghost" onclick="backToOrder()">← 주문수정</button>
          <button class="ghost" onclick="guestPay()">비회원 결제</button>
          <button class="confirm" id="lookupBtn" onclick="lookupMember()">확인</button>
        </div>
      </div>

      <!-- 2-2. 회원 확인 + 결제 승인 -->
      <div id="confirmStep" class="hidden">
        <div class="mcard" id="mcard"></div>
        <div id="pointBox">
          <label>포인트 사용 (1P=1원)</label>
          <div class="row">
            <input id="usePoints" inputmode="numeric" value="0" oninput="recalcPay()" />
            <button class="ghost" style="flex:0 0 92px" onclick="useAll()">전액사용</button>
          </div>
        </div>
        <label>결제수단</label>
        <div class="pill-row" id="methods">
          <span class="pill on" data-m="TOSS_CARD">카드</span>
          <span class="pill" data-m="TOSS_EASY">간편결제</span>
          <span class="pill" data-m="CASH">현금</span>
        </div>
        <div class="total"><span class="muted">실결제액</span><b id="payNet">0원</b></div>
        <button class="approve" id="approveBtn" onclick="approve()">결제 승인</button>
        <button class="ghost" style="width:100%;margin-top:8px;" onclick="resetPhone()">← 다시 입력</button>
      </div>
    </div>
  </div>

  <!-- ③ 완료 화면 -->
  <div id="doneView" class="hidden">
    <div class="card done">
      <div class="ok">✓</div>
      <h2>결제 완료</h2>
      <p class="muted" id="doneSub">감사합니다</p>
      <div class="receipt" id="receipt"></div>
      <div id="doneRewards"></div>
      <button class="pay" style="margin-top:16px;" onclick="newOrder()">새 주문 받기</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  const API_BASE = location.origin.includes(":5500") ? "http://localhost:8000" : location.origin;
  const $ = (id) => document.getElementById(id);
  const won = (n) => (n||0).toLocaleString("ko-KR") + "원";
  const CAT_ORDER = [["all","전체"],["coffee","커피"],["noncoffee","논커피"],["ade","티·에이드"],["dessert","디저트"]];

  let store=null, menu=[], cat="all", cart={}, member=null, method="TOSS_CARD", earnRate=0.05;

  function toast(m){ const t=$("toast"); t.textContent=m; t.style.display="block";
    clearTimeout(t._t); t._t=setTimeout(()=>t.style.display="none",2400); }
  async function api(path, opts){
    const r = await fetch(API_BASE+path, { headers:{"Content-Type":"application/json"}, ...opts });
    const b = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(b.detail || ("오류 "+r.status));
    return b;
  }

  async function init(){
    try {
      store = await api("/api/v1/store");
      earnRate = Number(store.point_earn_rate);
      $("storeTag").textContent = store.name + " · 적립 " + Math.round(earnRate*100) + "%";
      menu = await api("/api/v1/menu");
      renderCats(); renderMenu();
    } catch(e){ $("storeTag").textContent = "백엔드 연결 안됨"; }
  }

  function renderCats(){
    $("cats").innerHTML = CAT_ORDER.map(([k,l])=>
      `<span class="cat ${k===cat?"on":""}" onclick="setCat('${k}')">${l}</span>`).join("");
  }
  function setCat(k){ cat=k; renderCats(); renderMenu(); }

  function renderMenu(){
    const items = menu.filter(m => cat==="all" || m.category===cat);
    $("menu").innerHTML = items.map(m=>{
      const q = cart[m.id] ? cart[m.id].qty : 0;
      return `<div class="mi ${q?"sel":""}" onclick="addItem(${m.id})">
        ${q?`<span class="qty">${q}</span>`:""}
        <div class="emo">${m.emoji||"🍽️"}</div>
        <div class="nm">${m.name}</div>
        <div class="pr">${won(m.price)}</div>
      </div>`;
    }).join("");
  }

  function addItem(id){
    const m = menu.find(x=>x.id===id);
    if(!cart[id]) cart[id] = { item:m, qty:0 };
    cart[id].qty++;
    renderMenu(); renderCart();
  }
  function chgQty(id, d){
    if(!cart[id]) return;
    cart[id].qty += d;
    if(cart[id].qty<=0) delete cart[id];
    renderMenu(); renderCart();
  }
  function clearCart(){ cart={}; renderMenu(); renderCart(); }

  function cartTotal(){ return Object.values(cart).reduce((s,c)=>s+c.item.price*c.qty,0); }

  function renderCart(){
    const entries = Object.entries(cart);
    if(!entries.length){ $("cartList").innerHTML = '<div class="empty">메뉴를 담아주세요</div>'; }
    else $("cartList").innerHTML = entries.map(([id,c])=>
      `<div class="ci">
        <div class="cn">${c.item.emoji||""} ${c.item.name}<small>${won(c.item.price)}</small></div>
        <div class="stepper">
          <button onclick="chgQty(${id},-1)">−</button><b>${c.qty}</b><button onclick="chgQty(${id},1)">+</button>
        </div>
        <div class="ctot">${won(c.item.price*c.qty)}</div>
      </div>`).join("");
    $("cartTotal").textContent = won(cartTotal());
    $("payBtn").disabled = entries.length===0;
  }

  // ── 결제 단말 화면 ──
  let phone="";
  const keys=["1","2","3","4","5","6","7","8","9","비회원","0","←"];
  $("keypad").innerHTML = keys.map(k=> k==="비회원"
    ? `<button style="font-size:14px" onclick="guestPay()">비회원</button>`
    : `<button onclick="key('${k}')">${k}</button>`).join("");
  function key(k){ if(k==="←") phone=phone.slice(0,-1); else if(phone.length<11) phone+=k; renderPhone(); }
  function renderPhone(){
    $("phoneDisp").innerHTML = phone ? phone.replace(/(\d{3})(\d{0,4})(\d{0,4})/, (m,a,b,c)=>[a,b,c].filter(Boolean).join("-"))
      : '<span class="ph">고객번호 입력</span>';
    $("lookupBtn").disabled = phone.length < 10;
  }

  function goPay(){
    if(!Object.keys(cart).length) return;
    member=null; phone=""; renderPhone();
    $("termAmt").textContent = won(cartTotal());
    $("orderView").classList.add("hidden"); $("doneView").classList.add("hidden");
    $("payView").classList.remove("hidden");
    $("phoneStep").classList.remove("hidden"); $("confirmStep").classList.add("hidden");
  }
  function backToOrder(){ $("payView").classList.add("hidden"); $("orderView").classList.remove("hidden"); }
  function resetPhone(){ member=null; phone=""; renderPhone();
    $("phoneStep").classList.remove("hidden"); $("confirmStep").classList.add("hidden"); }

  async function lookupMember(){
    if(phone.length<10) return;
    try {
      member = await api("/api/v1/members/lookup?phone="+encodeURIComponent(phone));
      showConfirm();
    } catch(e){
      // 미등록 → 즉시 가입 후 진행
      if(confirm("미등록 번호입니다. 신규 회원으로 가입하고 적립할까요?")){
        const name = prompt("고객 이름을 입력하세요") || "신규회원";
        try { member = await api("/api/v1/members", { method:"POST",
          body: JSON.stringify({ phone, name, marketing_opt_in:true }) });
          toast("가입 완료 🎉"); showConfirm();
        } catch(err){ toast(err.message); }
      }
    }
  }
  function guestPay(){ member=null; showConfirm(); }

  function showConfirm(){
    $("phoneStep").classList.add("hidden"); $("confirmStep").classList.remove("hidden");
    if(member){
      $("mcard").innerHTML = `<div class="nm">${member.name} 님 <span class="badge b-${member.tier}">${member.tier_display||member.tier}</span></div>
        <div class="pts">보유 ${(member.points).toLocaleString("ko-KR")}P · 방문 ${member.visit_count}회</div>`;
      $("pointBox").classList.remove("hidden");
    } else {
      $("mcard").innerHTML = `<div class="nm">비회원 결제</div><div class="pts muted">적립·포인트 사용 없음</div>`;
      $("pointBox").classList.add("hidden");
    }
    $("usePoints").value="0";
    recalcPay();
  }

  function useAll(){ if(member){ $("usePoints").value = Math.min(member.points, cartTotal()); recalcPay(); } }
  function recalcPay(){
    let use = member ? Math.max(0, Math.min(parseInt($("usePoints").value||"0",10), member.points, cartTotal())) : 0;
    $("payNet").textContent = won(cartTotal() - use);
  }
  $("methods").addEventListener("click", e=>{
    const p=e.target.closest(".pill"); if(!p) return;
    [...$("methods").children].forEach(x=>x.classList.remove("on"));
    p.classList.add("on"); method=p.dataset.m;
  });

  async function approve(){
    const use = member ? Math.max(0, parseInt($("usePoints").value||"0",10)) : 0;
    const items = Object.values(cart).map(c=>({ menu_item_id:c.item.id, quantity:c.qty }));
    $("approveBtn").disabled=true; $("approveBtn").textContent="승인 중…";
    try {
      const res = await api("/api/v1/transactions", { method:"POST", body: JSON.stringify({
        member_id: member?member.id:null, items, points_to_use:use,
        payment_method:method, toss_order_id:"kiosk-"+Date.now(),
      })});
      showDone(res);
    } catch(e){ toast("❌ "+e.message); }
    finally { $("approveBtn").disabled=false; $("approveBtn").textContent="결제 승인"; }
  }

  function showDone(res){
    $("payView").classList.add("hidden"); $("doneView").classList.remove("hidden");
    const rows = (res.items||[]).map(i=>`<div class="r"><span>${i.name} × ${i.quantity}</span><span>${won(i.line_total)}</span></div>`).join("");
    $("receipt").innerHTML = rows +
      `<div class="r"><span class="muted">사용 포인트</span><span>−${won(res.points_used)}</span></div>` +
      `<div class="r"><b>실결제액</b><b style="color:var(--gold)">${won(res.net_amount)}</b></div>`;
    if(res.member){
      $("doneSub").textContent = `${res.member.name} 님 · +${res.points_earned}P 적립 (보유 ${res.member.points.toLocaleString("ko-KR")}P)`;
      let rw = (res.rewards||[]).map(r=>`<div class="reward">◆ ${r.title} · +${r.points}P</div>`).join("");
      if(res.member.stamps!==undefined) rw += `<div class="reward">스탬프 ${res.member.stamps}/${res.member.stamp_goal}</div>`;
      $("doneRewards").innerHTML = rw;
    } else { $("doneSub").textContent = "비회원 결제 완료"; $("doneRewards").innerHTML=""; }
  }

  function newOrder(){ cart={}; member=null; renderMenu(); renderCart();
    $("doneView").classList.add("hidden"); $("orderView").classList.remove("hidden"); }

  init(); renderCart(); renderPhone();
</script>
</body>
</html>
